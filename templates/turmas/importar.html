{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Importar backup NDJSON</h2>
  <a href="{{ url_for('turmas_list') }}" class="btn btn-outline-secondary">Voltar</a>
</div>

<div class="card shadow-sm">
  <div class="card-header fw-semibold">Importacao de backup (.ndjson.gz)</div>
  <div class="card-body">
    <form method="post" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label" for="ficheiro">Selecionar backup (.ndjson.gz)</label>
        <input
          type="file"
          id="ficheiro"
          name="ficheiro"
          class="form-control"
          accept=".gz,.ndjson.gz,application/gzip"
          required
        >
        <div class="form-text">
          O ficheiro e processado linha a linha e a importacao e atomica (rollback se houver erro).
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Importar</button>
    </form>
  </div>
</div>
{% endblock %}
