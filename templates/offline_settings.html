{% extends "base.html" %}
{% block content %}
<h2>Definições offline</h2>
<form method="post" class="card card-body">
  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" name="snapshot_enabled" id="snapshot_enabled" {% if settings.snapshot_enabled == '1' %}checked{% endif %}>
    <label class="form-check-label" for="snapshot_enabled">Snapshot automático ativo</label>
  </div>
  <label class="form-label" for="snapshot_interval_seconds">Intervalo (segundos)</label>
  <input class="form-control" type="number" min="15" name="snapshot_interval_seconds" id="snapshot_interval_seconds" value="{{ settings.snapshot_interval_seconds }}">
  <button class="btn btn-primary mt-3" type="submit">Guardar</button>
</form>
{% endblock %}
