{% extends "admin_base.html" %}
{% block admin_content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="h5 mb-0">Turmas</h3>
  <a class="btn btn-primary btn-sm" href="{{ url_for('turmas_add') }}">Nova turma</a>
</div>

<table class="table table-sm align-middle">
  <thead><tr><th>Turma</th><th>Ano letivo</th><th>Alunos</th><th></th></tr></thead>
  <tbody>
  {% for turma in turmas %}
    <tr>
      <td>{{ turma.nome }}</td>
      <td>{{ turma.ano_letivo.nome if turma.ano_letivo else '—' }}</td>
      <td>{{ turma.alunos|length }}</td>
      <td class="text-end">
        <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('turmas_edit', turma_id=turma.id) }}">Editar</a>
        <a class="btn btn-sm btn-outline-primary" href="{{ url_for('turma_alunos', turma_id=turma.id) }}">Alunos</a>
      </td>
    </tr>
  {% else %}
    <tr><td colspan="4" class="text-muted">Sem turmas.</td></tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
