{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><h2>Cargos de EE</h2><a href="{{ url_for('direcao_turma_alunos', dt_id=dt_turma.id) }}" class="btn btn-secondary">Voltar</a></div>
<form method="post" class="card card-body shadow-sm mb-3">
  <div class="row g-2 align-items-end">
    <div class="col-md-4"><label class="form-label">EE</label><select name="ee_id" class="form-select" required>{% for ee in ees %}<option value="{{ ee.id }}">{{ ee.nome }}</option>{% endfor %}</select></div>
    <div class="col-md-3"><label class="form-label">Cargo</label><select name="cargo" class="form-select"><option value="representante_ee">representante_ee</option><option value="suplente_representante_ee">suplente_representante_ee</option></select></div>
    <div class="col-md-2"><label class="form-label">Data início</label><input type="date" name="data_inicio" class="form-control" required></div>
    <div class="col-md-1"><label class="form-label">Data fim</label><input type="date" name="data_fim" class="form-control"></div>
    <div class="col-md-2"><label class="form-label">Motivo fim</label><input name="motivo_fim" class="form-control"></div>
  </div>
  <div class="mt-2"><button class="btn btn-primary" {% if bloqueado %}disabled{% endif %}>Registar cargo</button></div>
</form>
<table class="table table-striped"><thead class="table-light"><tr><th>EE</th><th>Cargo</th><th>Início</th><th>Fim</th><th>Motivo</th></tr></thead><tbody>{% for c in cargos %}<tr><td>{{ c.ee.nome if c.ee else '—' }}</td><td>{{ c.cargo }}</td><td>{{ c.data_inicio }}</td><td>{{ c.data_fim or 'Ativo' }}</td><td>{{ c.motivo_fim or '—' }}</td></tr>{% else %}<tr><td colspan="5" class="text-muted">Sem cargos.</td></tr>{% endfor %}</tbody></table>
{% endblock %}
