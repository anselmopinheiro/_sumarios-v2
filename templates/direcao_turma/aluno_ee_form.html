{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>EE do aluno — {{ dt_aluno.aluno.nome if dt_aluno.aluno else 'Aluno' }}</h2>
  <a href="{{ url_for('direcao_turma_alunos', dt_id=dt_turma.id) }}" class="btn btn-secondary">Voltar</a>
</div>
{% if atual %}<div class="alert alert-info">EE atual: <strong>{{ atual.ee.nome if atual.ee else '—' }}</strong> (desde {{ atual.data_inicio }})</div>{% endif %}
<form method="post" class="card card-body shadow-sm">
  <div class="row g-3">
    <div class="col-md-6"><label class="form-label">EE</label><select name="ee_id" class="form-select" required>{% for ee in ees %}<option value="{{ ee.id }}" {% if atual and atual.ee_id==ee.id %}selected{% endif %}>{{ ee.nome }}</option>{% endfor %}</select></div>
    <div class="col-md-3"><label class="form-label">Data início</label><input name="data_inicio" type="date" class="form-control" value="{{ (atual.data_inicio if atual else none) or '' }}" required></div>
    <div class="col-md-3"><label class="form-label">Parentesco</label><input name="parentesco" class="form-control" value="{{ atual.parentesco if atual else '' }}"></div>
    <div class="col-12"><label class="form-label">Observações</label><textarea name="observacoes" class="form-control" rows="3"></textarea></div>
  </div>
  <div class="mt-3"><button class="btn btn-primary" {% if bloqueado %}disabled{% endif %}>Guardar</button></div>
</form>
{% endblock %}
