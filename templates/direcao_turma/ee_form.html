{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h2>{{ "Editar EE" if is_edit else "Novo EE" }}</h2>
    <div class="text-muted">{{ dt_turma.turma.nome if dt_turma.turma else 'Turma' }} — {{ dt_turma.ano_letivo.nome if dt_turma.ano_letivo else 'Ano letivo' }}</div>
  </div>
  <a href="{{ url_for('direcao_turma_ee_list', dt_id=dt_turma.id) }}" class="btn btn-secondary">Voltar</a>
</div>
<form method="post" class="card card-body shadow-sm">
  <div class="row g-3">
    <div class="col-md-6"><label class="form-label">Nome</label><input name="nome" class="form-control" value="{{ ee.nome if ee else "" }}" required></div>
    <div class="col-md-3"><label class="form-label">Telefone</label><input name="telefone" class="form-control" value="{{ ee.telefone if ee else "" }}"></div>
    <div class="col-md-3"><label class="form-label">Email</label><input name="email" class="form-control" type="email" value="{{ ee.email if ee else "" }}"></div>
    <div class="col-md-4"><label class="form-label">Nome alternativo</label><input name="nome_alternativo" class="form-control" value="{{ ee.nome_alternativo if ee else "" }}"></div>
    <div class="col-md-4"><label class="form-label">Telefone alternativo</label><input name="telefone_alternativo" class="form-control" value="{{ ee.telefone_alternativo if ee else "" }}"></div>
    <div class="col-md-4"><label class="form-label">Email alternativo</label><input name="email_alternativo" class="form-control" type="email" value="{{ ee.email_alternativo if ee else "" }}"></div>
    <div class="col-12"><label class="form-label">Observações</label><textarea name="observacoes" rows="3" class="form-control">{{ ee.observacoes if ee else "" }}</textarea></div>
  </div>
  <div class="mt-3 d-flex flex-wrap gap-2">
    <button class="btn btn-primary" name="submit_action" value="save" {% if bloqueado %}disabled{% endif %}>Guardar</button>
    {% if not is_edit %}
      <button class="btn btn-outline-primary" name="submit_action" value="save_new" {% if bloqueado %}disabled{% endif %}>Guardar e criar outro</button>
      <button class="btn btn-outline-secondary" name="submit_action" value="save_back" {% if bloqueado %}disabled{% endif %}>Guardar e voltar à DT</button>
    {% endif %}
  </div>
</form>
{% endblock %}
