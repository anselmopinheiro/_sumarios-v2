{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Editar associação EE↔aluno</h2>
  {% if dt_turma %}
  <a class="btn btn-secondary" href="{{ url_for('direcao_turma_ee_list', dt_id=dt_turma.id) }}">Voltar</a>
  {% endif %}
</div>

<form method="post" class="card card-body shadow-sm mb-3">
  {% if dt_turma %}<input type="hidden" name="dt_id" value="{{ dt_turma.id }}">{% endif %}
  <div class="row g-3">
    <div class="col-md-6"><label class="form-label">EE</label><select name="ee_id" class="form-select" required>{% for ee in ees %}<option value="{{ ee.id }}" {% if rel.ee_id==ee.id %}selected{% endif %}>{{ ee.nome }}</option>{% endfor %}</select></div>
    <div class="col-md-6"><label class="form-label">Aluno</label><select name="aluno_id" class="form-select" required>{% for a in alunos %}<option value="{{ a.id }}" {% if rel.aluno_id==a.id %}selected{% endif %}>{{ a.nome }}</option>{% endfor %}</select></div>
    <div class="col-md-3"><label class="form-label">Parentesco</label><select name="parentesco" id="parentesco_select_edit" class="form-select">{% set p = rel.parentesco or '' %}<option value="">—</option><option value="Pai" {% if p=='Pai' %}selected{% endif %}>Pai</option><option value="Mãe" {% if p=='Mãe' %}selected{% endif %}>Mãe</option><option value="Avô" {% if p=='Avô' %}selected{% endif %}>Avô</option><option value="Avó" {% if p=='Avó' %}selected{% endif %}>Avó</option><option value="Outro" {% if p.startswith('Outro') %}selected{% endif %}>Outro</option></select></div>
    <div class="col-md-3" id="parentesco_outro_wrap_edit" style="display:none;"><label class="form-label">Outro (detalhe)</label><input name="parentesco_outro" class="form-control" value="{{ p.replace('Outro:','').strip() if p.startswith('Outro') else '' }}"></div>
    <div class="col-md-3"><label class="form-label">Data início</label><input name="data_inicio" type="date" class="form-control" value="{{ rel.data_inicio.isoformat() if rel.data_inicio else '' }}" required></div>
    <div class="col-md-3"><label class="form-label">Data fim</label><input name="data_fim" type="date" class="form-control" value="{{ rel.data_fim.isoformat() if rel.data_fim else '' }}"></div>
    <div class="col-12"><label class="form-label">Observações</label><textarea name="observacoes" class="form-control" rows="3">{{ rel.observacoes or '' }}</textarea></div>
  </div>
  <div class="mt-3"><button class="btn btn-primary" name="action" value="save">Guardar alterações</button></div>
</form>

<div class="card card-body shadow-sm">
  <h5>Ações de estado</h5>
  <form method="post" class="row g-2 align-items-end mb-2">
    {% if dt_turma %}<input type="hidden" name="dt_id" value="{{ dt_turma.id }}">{% endif %}
    <div class="col-md-3"><label class="form-label">Data fim</label><input type="date" name="data_fim" class="form-control"></div>
    <div class="col-md-6"><label class="form-label">Observação/motivo (opcional)</label><input type="text" name="observacoes_termino" class="form-control"></div>
    <div class="col-md-3"><button class="btn btn-outline-warning w-100" name="action" value="terminar">Terminar associação</button></div>
  </form>
  <form method="post">
    {% if dt_turma %}<input type="hidden" name="dt_id" value="{{ dt_turma.id }}">{% endif %}
    <button class="btn btn-outline-success" name="action" value="reabrir">Reabrir associação</button>
  </form>
</div>

<script>
(() => {
  const s = document.getElementById('parentesco_select_edit');
  const w = document.getElementById('parentesco_outro_wrap_edit');
  if (!s || !w) return;
  const u = () => { w.style.display = s.value === 'Outro' ? '' : 'none'; };
  s.addEventListener('change', u); u();
})();
</script>
{% endblock %}
