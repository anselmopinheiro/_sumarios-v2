{% extends "base.html" %}
{% block content %}
<h2>Aulas offline — {{ turma.nome if turma else 'Turma' }}</h2>
<table class="table table-striped">
  <thead><tr><th>Data</th><th>Tipo</th><th>Ação</th></tr></thead>
  <tbody>
  {% for aula in aulas %}
    <tr>
      <td>{{ aula.data or '' }}</td>
      <td>{{ aula.tipo or '' }}</td>
      <td><a class="btn btn-sm btn-outline-primary" href="{{ url_for('offline.aula_presencas', aula_id=aula.id) }}">Presenças</a></td>
    </tr>
  {% else %}
    <tr><td colspan="3" class="text-muted">Sem aulas no snapshot.</td></tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
